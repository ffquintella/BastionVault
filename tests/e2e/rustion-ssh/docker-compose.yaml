# Three-service stack exercising Rustion-mediated SSH end-to-end.
# Maps the four steps from features/rustion-integration.md § Trust
# model onto a docker network:
#
#   bastion-vault   — sources the BVRG-v1 envelope, exposes the
#                     `rustion/session/open` route on :8200
#   rustion         — verifies envelopes, mints tickets, proxies SSH
#                     to the openssh-target on :2222
#   openssh-target  — vanilla OpenSSH server on :22 the operator
#                     eventually shells into
#
# Driver script `run.sh` walks the stack from cold-start to opened
# session.

services:
  bastion-vault:
    build:
      context: ../../..
      dockerfile: Dockerfile
    image: bastion-vault:phase32
    container_name: bv
    networks:
      - rustion-e2e
    ports:
      - "8200:8200"  # HTTP API
      - "8201:8201"  # Hiqlite raft (single-node test mode)
    volumes:
      - ./var/bv:/var/lib/bastion-vault
      - ./config/bv-config.hcl:/etc/bastion-vault/config.hcl:ro
    # The image's default CMD points at config.toml; this harness ships
    # an HCL config (file storage + plaintext listener), so override the
    # config path. The server comes up *sealed + uninitialised* — run.sh
    # drives init + unseal over the API and captures the root token.
    command: ["server", "--config", "/etc/bastion-vault/config.hcl"]
    environment:
      - VAULT_LOG_LEVEL=info

  rustion:
    build:
      # Rustion lives as a sibling of the BastionVault repo
      # (/Users/felipe/Dev/rustion), four levels up from this compose
      # file. (`../../../Rustion` — three levels — would resolve inside
      # the BastionVault tree and does not exist.)
      context: ../../../../rustion
      dockerfile: Dockerfile
    image: rustion:phase32
    container_name: rustion
    networks:
      - rustion-e2e
    ports:
      - "2222:2222"  # SSH listener (the bastion's user-facing port)
      - "9443:9443"  # Control-plane HTTP (where /v1/sessions lives)
    volumes:
      - ./config/rustion.toml:/etc/rustion/rustion.toml:ro
      - ./config/rustion-authorities:/etc/rustion/authorities:ro
      - ./var/rustion:/var/lib/rustion
    depends_on:
      - openssh-target

  openssh-target:
    # Lightweight Alpine + OpenSSH; password auth allowed for the
    # `deploy` user so the BV-mediated session reaches it.
    image: linuxserver/openssh-server:latest
    container_name: openssh-target
    networks:
      rustion-e2e:
        aliases:
          - target
    environment:
      - PUID=1000
      - PGID=1000
      - USER_NAME=deploy
      - USER_PASSWORD=hunter2
      - PASSWORD_ACCESS=true
      - SUDO_ACCESS=false
    expose:
      # linuxserver/openssh-server listens on 2222 inside the container.
      - "2222"

networks:
  rustion-e2e:
    driver: bridge
