# Pin the cross-compilation base image to an old-glibc, cross-compatible
# sysroot so the packaged bvault CLI runs on older Linux hosts.
#
# WHY: cross's default `x86_64-unknown-linux-gnu:main` image is built on
# Ubuntu 24.04 (glibc 2.39). Binaries linked there require GLIBC_2.38/2.39
# and fail on RHEL 8/9 (glibc 2.28/2.34) with:
#   /usr/bin/bvault: /lib64/libc.so.6: version `GLIBC_2.39' not found
#
# The rust-cross manylinux2014 image provides glibc 2.17 — the de-facto
# "portable Linux" floor (RHEL 7 and newer, all modern Debian/Ubuntu) — and
# ships cmake/perl/gcc so the C/asm crates in this tree (aws-lc-sys, ring,
# libsqlite3-sys, zstd-sys) build cleanly. This is the combo the
# rust-cross/manylinux-cross project documents for use with `cross`.
#
# Applies to both `make linux-cli-rpm` and `make linux-cli-deb`.
[target.x86_64-unknown-linux-gnu]
image = "ghcr.io/rust-cross/manylinux2014-cross:x86_64"

# Windows amd64 cross-build (for `make windows-cli-msi` / `-nupkg` on a
# non-Windows host). cross's default `x86_64-pc-windows-gnu` image ships
# the mingw-w64 toolchain but NOT nasm, so aws-lc-sys aborts its build:
#   NASM command not found! Build cannot continue.
# The crypto C/asm crates in this tree (aws-lc-sys, ring) need nasm for the
# x86_64 assembly and cmake for aws-lc's build; clang/libclang cover any
# bindgen path. Install them into the build container before the compile.
[target.x86_64-pc-windows-gnu]
pre-build = [
    "apt-get update && apt-get install --assume-yes --no-install-recommends nasm cmake clang libclang-dev",
]
