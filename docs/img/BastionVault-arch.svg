<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .box { fill: #fff; stroke: #333; stroke-width: 1.5; rx: 6; }
      .group { fill: none; stroke: #333; stroke-width: 1.5; stroke-dasharray: 8,4; rx: 8; }
      .group-fill { fill: #f5a623; opacity: 0.12; stroke: none; rx: 8; }
      .label { font-size: 13px; fill: #333; text-anchor: middle; dominant-baseline: central; }
      .label-bold { font-size: 14px; fill: #333; font-weight: 600; text-anchor: start; }
      .label-title { font-size: 15px; fill: #333; font-weight: 700; text-anchor: start; }
      .module { fill: #fff; stroke: #d4a017; stroke-width: 1.5; rx: 6; }
      .core { fill: #fff; stroke: #d4a017; stroke-width: 1.5; rx: 6; }
      .core-bg { fill: #f5a623; opacity: 0.18; stroke: none; rx: 6; }
      .ext { fill: #fff; stroke: #666; stroke-width: 1.2; rx: 6; }
      .arrow { stroke: #555; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-double { stroke: #555; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); marker-start: url(#arrowhead-start); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <marker id="arrowhead-start" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Main BastionVault group -->
  <rect class="group" x="30" y="20" width="840" height="590"/>
  <text class="label-title" x="50" y="42">BastionVault</text>

  <!-- Interface layer -->
  <rect class="group" x="50" y="55" width="800" height="70"/>
  <text class="label-bold" x="70" y="75">BastionVault Interface</text>
  <rect class="box" x="120" y="80" width="120" height="32"/>
  <text class="label" x="180" y="96">CLI (bvault)</text>
  <rect class="box" x="270" y="80" width="120" height="32"/>
  <text class="label" x="330" y="96">REST API</text>
  <rect class="box" x="420" y="80" width="120" height="32"/>
  <text class="label" x="480" y="96">Daemon</text>
  <rect class="box" x="570" y="80" width="180" height="32"/>
  <text class="label" x="660" y="96">GUI (Tauri desktop)</text>

  <!-- Arrow from interface to modules -->
  <line class="arrow" x1="450" y1="125" x2="450" y2="148"/>

  <!-- Modules layer -->
  <rect class="group-fill" x="50" y="150" width="800" height="170"/>
  <rect class="group" x="50" y="150" width="800" height="170"/>
  <text class="label-title" x="70" y="172">BastionVault Modules</text>

  <rect class="module" x="70" y="185" width="130" height="32"/>
  <text class="label" x="135" y="201">KV Secrets</text>

  <rect class="module" x="220" y="185" width="130" height="32"/>
  <text class="label" x="285" y="201">PKI / Keys</text>

  <rect class="module" x="370" y="185" width="130" height="32"/>
  <text class="label" x="435" y="201">Auth / Credential</text>

  <rect class="module" x="520" y="185" width="130" height="32"/>
  <text class="label" x="585" y="201">Policy / ACL</text>

  <rect class="module" x="670" y="185" width="160" height="32"/>
  <text class="label" x="750" y="201">System / Metrics</text>

  <!-- Core managers row -->
  <rect class="core-bg" x="70" y="240" width="760" height="65"/>
  <text class="label-bold" x="90" y="258">Core</text>

  <rect class="core" x="70" y="270" width="140" height="28"/>
  <text class="label" x="140" y="284">Module Manager</text>

  <rect class="core" x="220" y="270" width="140" height="28"/>
  <text class="label" x="290" y="284">Crypto Engine</text>

  <rect class="core" x="370" y="270" width="140" height="28"/>
  <text class="label" x="440" y="284">Storage Engine</text>

  <rect class="core" x="520" y="270" width="140" height="28"/>
  <text class="label" x="590" y="284">Seal Manager</text>

  <rect class="core" x="670" y="270" width="140" height="28"/>
  <text class="label" x="740" y="284">Plugin Host</text>

  <!-- TLS layer -->
  <rect class="group" x="50" y="340" width="800" height="50"/>
  <text class="label-bold" x="70" y="370">TLS (rustls)</text>
  <text class="label" x="450" y="370">mTLS &amp; certificate verification (X25519MLKEM768 hybrid PQC)</text>

  <!-- Arrows from modules to bottom row -->
  <line class="arrow" x1="180" y1="400" x2="180" y2="440"/>
  <line class="arrow" x1="450" y1="400" x2="450" y2="440"/>
  <line class="arrow" x1="720" y1="400" x2="720" y2="440"/>

  <!-- Crypto layer -->
  <rect class="group" x="50" y="445" width="260" height="135"/>
  <text class="label-bold" x="70" y="468">bv_crypto (Pure Rust)</text>

  <rect class="ext" x="70" y="480" width="110" height="28"/>
  <text class="label" x="125" y="494">ChaCha20</text>

  <rect class="ext" x="190" y="480" width="110" height="28"/>
  <text class="label" x="245" y="494">ML-KEM-768</text>

  <rect class="ext" x="70" y="515" width="110" height="28"/>
  <text class="label" x="125" y="529">ML-DSA-65</text>

  <rect class="ext" x="190" y="515" width="110" height="28"/>
  <text class="label" x="245" y="529" font-size="11">BLAKE2b / SHA-256</text>

  <rect class="ext" x="70" y="550" width="230" height="24"/>
  <text class="label" x="185" y="562" font-size="11">KemDemEnvelopeV1 barrier</text>

  <!-- Storage layer -->
  <rect class="group" x="320" y="445" width="260" height="135"/>
  <text class="label-bold" x="340" y="468">Storage Backends</text>

  <rect class="ext" x="340" y="480" width="100" height="28"/>
  <text class="label" x="390" y="494">Hiqlite</text>

  <rect class="ext" x="455" y="480" width="100" height="28"/>
  <text class="label" x="505" y="494">File</text>

  <rect class="ext" x="340" y="515" width="100" height="28"/>
  <text class="label" x="390" y="529" font-size="11">MySQL (legacy)</text>

  <rect class="ext" x="455" y="515" width="100" height="28"/>
  <text class="label" x="505" y="529" font-size="11">Cloud (S3/OneDrive)</text>

  <text class="label" x="450" y="562" font-size="11">default: Hiqlite (embedded Raft SQLite, HA)</text>

  <!-- Plugin system layer -->
  <rect class="group" x="590" y="445" width="260" height="135"/>
  <text class="label-bold" x="610" y="468">Plugin System</text>

  <rect class="ext" x="610" y="480" width="110" height="28"/>
  <text class="label" x="665" y="494">WASM runtime</text>

  <rect class="ext" x="730" y="480" width="110" height="28"/>
  <text class="label" x="785" y="494" font-size="12">Process runtime</text>

  <rect class="ext" x="610" y="515" width="230" height="28"/>
  <text class="label" x="725" y="529" font-size="12">Dynamic-secrets engines</text>

  <text class="label" x="725" y="562" font-size="11">catalogued via sys/plugins, sandboxed</text>

  <!-- Footer labels -->
  <text class="label" x="180" y="635" font-size="12" fill="#888">Post-quantum cryptographic primitives</text>
  <text class="label" x="450" y="635" font-size="12" fill="#888">Encrypted at rest via barrier layer</text>
  <text class="label" x="720" y="635" font-size="12" fill="#888">Dynamic engines &amp; extensions</text>
</svg>
