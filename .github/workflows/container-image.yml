# BastionVault server container image — build + push to GHCR.
#
# Wave 1, Phase 1 of the Packaging & Distribution roadmap:
# - linux/amd64 only
# - unsigned (Cosign keyless signing arrives in Wave 2 / Phase 3)
# - tags pushed: vX.Y.Z, vX.Y, vX, latest
#
# See:
#   roadmaps/packaging-and-distribution.md
#   features/packaging-podman-server.md
#   deploy/container/Containerfile

name: container-image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional override tag to push as (e.g. v0.4.0-rc1). Leave blank to use the git tag (push events) or "manual-<sha>" (workflow_dispatch).'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build + push linux/amd64
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # Submodules (plugins-ext, IronRDP) are excluded by .dockerignore
          # and excluded from the cargo workspace; no need to pull them.
          submodules: false

      - name: Set up QEMU
        # Not strictly needed for amd64-on-amd64, but installing it now
        # means Wave 2's arm64 addition is a one-line buildx change.
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata + tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bastionvault
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=raw,value=manual-${{ github.sha }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.tag == '' }}
          labels: |
            org.opencontainers.image.title=BastionVault
            org.opencontainers.image.description=Identity-based secrets management server (Vault-API compatible)
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build + push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/container/Containerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache builder layers across runs to amortise the slow Rust
          # compile. Phase 3 may switch to cargo-chef for finer control.
          cache-from: type=gha,scope=container-image-amd64
          cache-to: type=gha,scope=container-image-amd64,mode=max

      - name: Summary
        run: |
          {
            echo "### Pushed image"
            echo ""
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "Wave 1 / Phase 1 — unsigned. Cosign signing + SBOM arrive in Wave 2 / Phase 3."
          } >> "$GITHUB_STEP_SUMMARY"
